services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Inside the compose network the Ollama service is reachable by name,
      # not localhost. Everything else passes through from the host shell or
      # an optional .env so the hosted-open path works unchanged:
      #   HOSTED_OPEN_API_KEY=... docker compose up
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      RCA_MODEL: ${RCA_MODEL:-qwen3:8b}
      RCA_ALLOWED_MODELS: ${RCA_ALLOWED_MODELS:-qwen3:8b,qwen3.5:4b}
      RCA_PROMPT_VERSION: ${RCA_PROMPT_VERSION:-v3}
      RCA_MAX_RETRIES: ${RCA_MAX_RETRIES:-2}
      RCA_MAX_OUTPUT_TOKENS: ${RCA_MAX_OUTPUT_TOKENS:-4096}
      RCA_REQUEST_TIMEOUT_SECONDS: ${RCA_REQUEST_TIMEOUT_SECONDS:-120}
      RCA_AGENT_TIMEOUT_SECONDS: ${RCA_AGENT_TIMEOUT_SECONDS:-420}
      RCA_MAX_REVISE_ROUNDS: ${RCA_MAX_REVISE_ROUNDS:-2}
      RCA_VALIDATION_ENABLED: ${RCA_VALIDATION_ENABLED:-true}
      VALIDATION_MODEL: ${VALIDATION_MODEL:-llama3.2:latest}
      HOSTED_OPEN_BASE_URL: ${HOSTED_OPEN_BASE_URL:-}
      HOSTED_OPEN_API_KEY: ${HOSTED_OPEN_API_KEY:-}
      HOSTED_OPEN_MODEL: ${HOSTED_OPEN_MODEL:-}
      RCA_MAX_INPUT_CHARS: ${RCA_MAX_INPUT_CHARS:-6000}
      RCA_MAX_CONTEXT_CHARS: ${RCA_MAX_CONTEXT_CHARS:-12000}
      RCA_MEMORY_ENABLED: ${RCA_MEMORY_ENABLED:-true}
      RCA_MEMORY_PATH: ${RCA_MEMORY_PATH:-/app/data/past_rca_memory_sample_repaired.xlsx}
      RCA_MEMORY_MAX_MATCHES: ${RCA_MEMORY_MAX_MATCHES:-3}
      RCA_MEMORY_MIN_SCORE: ${RCA_MEMORY_MIN_SCORE:-0.50}
      RCA_MEMORY_WRITEBACK_ENABLED: ${RCA_MEMORY_WRITEBACK_ENABLED:-true}
      RCA_MEMORY_GRAPH_ENABLED: ${RCA_MEMORY_GRAPH_ENABLED:-true}
      RCA_MEMORY_GRAPH_PATH: ${RCA_MEMORY_GRAPH_PATH:-/app/outputs/cache/rca_memory_graph.sqlite}
      RCA_JOB_HISTORY_PATH: ${RCA_JOB_HISTORY_PATH:-/app/outputs/app_state.sqlite}
      RCA_JOB_HISTORY_MAX_JOBS: ${RCA_JOB_HISTORY_MAX_JOBS:-200}
      RCA_JOB_HISTORY_RETENTION_DAYS: ${RCA_JOB_HISTORY_RETENTION_DAYS:-30}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_ALGORITHMS: ${AUTH0_ALGORITHMS:-RS256}
      AUTH_ADMIN_PERMISSION: ${AUTH_ADMIN_PERMISSION:-rca:admin}
      OUTPUT_DIR: /app/outputs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-false}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
    ports:
      - "5173:80"
    depends_on:
      - app

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
